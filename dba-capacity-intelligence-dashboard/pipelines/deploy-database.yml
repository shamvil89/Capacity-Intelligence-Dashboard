trigger: none
pr: none

pool:
  name: Shamvil-pool
  demands:
    - Agent.Name -equals shamvil
    - Agent.OS -equals Windows_NT

variables:
  projectRoot: dba-capacity-intelligence-dashboard

steps:
  - checkout: self

  - task: PowerShell@2
    displayName: Deploy DBAUtility database scripts
    inputs:
      pwsh: false
      targetType: inline
      script: |
        $ErrorActionPreference = 'Stop'

        Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
        Install-Module SqlServer -Scope CurrentUser -Force -AllowClobber

        $projectRoot = Join-Path '$(Build.SourcesDirectory)' '$(projectRoot)'
        $databaseRoot = Join-Path $projectRoot 'database'

        if (-not (Test-Path $databaseRoot)) {
          throw "Database script folder not found: $databaseRoot"
        }

        $orderedScripts = @()
        $orderedScripts += (Resolve-Path (Join-Path $databaseRoot '001_Create_Database.sql')).Path
        $orderedScripts += Get-ChildItem (Join-Path $databaseRoot 'tables') -Filter '*.sql' | Sort-Object Name | Select-Object -ExpandProperty FullName
        $orderedScripts += Get-ChildItem (Join-Path $databaseRoot 'procedures') -Filter '*.sql' | Sort-Object Name | Select-Object -ExpandProperty FullName
        $orderedScripts += Get-ChildItem (Join-Path $databaseRoot 'views') -Filter '*.sql' | Sort-Object Name | Select-Object -ExpandProperty FullName
        $orderedScripts += Get-ChildItem (Join-Path $databaseRoot 'seed') -Filter '*.sql' | Sort-Object Name | Select-Object -ExpandProperty FullName

        foreach ($script in $orderedScripts) {
          Write-Host "Running $script"
          Invoke-Sqlcmd `
            -ServerInstance $env:DBA_REPOSITORY_SERVER `
            -Username $env:SQL_USER `
            -Password $env:SQL_PASSWORD `
            -InputFile $script `
            -TrustServerCertificate `
            -ErrorAction Stop
        }
    env:
      DBA_REPOSITORY_SERVER: $(DBA_REPOSITORY_SERVER)
      SQL_USER: $(SQL_USER)
      SQL_PASSWORD: $(SQL_PASSWORD)
